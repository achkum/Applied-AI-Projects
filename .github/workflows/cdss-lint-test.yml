# CI for the BreastCancerDetection CDSS (monorepo-root workflow, scoped to that subtree).
# Runs with no secrets — lint + unit tests for backend (uv) and frontend (pnpm).
name: cdss-lint-test

on:
  push:
    branches: [main]
    paths: ["BreastCancerDetection/**"]
  pull_request:
    paths: ["BreastCancerDetection/**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BreastCancerDetection/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BreastCancerDetection/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: BreastCancerDetection/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
