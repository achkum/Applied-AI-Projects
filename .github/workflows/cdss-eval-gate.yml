# Model eval gate: run the real model over a labelled fixture set from GCS and assert AUC > 0.85.
# Dormant until you opt in by setting repo variable GCP_ENABLED=true (plus the secrets/vars below),
# so it never shows a red X before GCP is configured.
#
#   secrets.GCP_SA_KEY          - service-account JSON with read access to the bucket
#   vars.MODEL_GCS_URI          - gs://breast-cancer-cdss-models/resnet50_breakhis_400x.pth
#   vars.EVAL_FIXTURES_GCS_URI  - gs://breast-cancer-cdss-models/fixtures
name: cdss-eval-gate

on:
  push:
    branches: [main]
    paths: ["BreastCancerDetection/**"]
  pull_request:
    paths: ["BreastCancerDetection/**"]

jobs:
  eval:
    if: ${{ vars.GCP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BreastCancerDetection/backend
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Download eval fixtures from GCS
        run: gcloud storage cp -r "${{ vars.EVAL_FIXTURES_GCS_URI }}" "${{ github.workspace }}/eval-fixtures"
      - name: Run eval gate (real model, weights auto-downloaded from GCS)
        env:
          MODEL_GCS_URI: ${{ vars.MODEL_GCS_URI }}
          EVAL_FIXTURES_DIR: ${{ github.workspace }}/eval-fixtures
        run: uv run pytest tests/test_eval_gate.py -q -rs
