# Build + deploy the backend to Cloud Run, after the eval gate passes on main.
# Dormant until repo variable GCP_ENABLED=true (plus the secrets/vars below) are set.
# The frontend deploys separately via Vercel's GitHub integration.
#
#   vars.WIF_PROVIDER / WIF_SERVICE_ACCOUNT  - keyless Workload Identity auth (no stored key)
#   vars.GCP_PROJECT_ID / GCP_REGION / AR_REPOSITORY / CLOUD_RUN_SERVICE / MODEL_GCS_URI / ALLOWED_ORIGINS
# The deployed service reads GEMINI_API_KEY from Secret Manager, so no GitHub secret is needed.
name: cdss-deploy

on:
  workflow_run:
    workflows: ["cdss-eval-gate"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.GCP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
      - name: Build and push image
        run: |
          docker build -t "$IMAGE" BreastCancerDetection/backend
          docker push "$IMAGE"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --set-env-vars "MODEL_GCS_URI=${{ vars.MODEL_GCS_URI }},ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"
