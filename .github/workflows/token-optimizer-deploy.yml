# Build + deploy the secret-free compression service + engine demo to Cloud Run (keyless WIF).
# Dormant until repo variable TS_GCP_ENABLED=true (plus the vars below) are set. Uses its OWN
# GCP project + Workload Identity — fully independent of any other project in this monorepo.
#
#   vars.TS_WIF_PROVIDER / TS_WIF_SERVICE_ACCOUNT    - keyless auth (no stored key)
#   vars.TS_GCP_PROJECT_ID / TS_GCP_REGION
#   vars.TS_AR_REPOSITORY / TS_CLOUD_RUN_SERVICE / TS_ALLOWED_ORIGINS
#   vars.TS_RUN_SERVICE_ACCOUNT                       - runtime identity (reads the model bucket)
#   vars.TS_MODEL_GCS                                 - gs://bucket/prefix of the int8 model + tokenizer
# No application secrets are needed — the service holds no API keys.
name: token-optimizer-deploy

on:
  push:
    branches: [main]
    paths:
      - "TokenOptimizer/**"
      - ".github/workflows/token-optimizer-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ vars.TS_GCP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.TS_GCP_REGION }}-docker.pkg.dev/${{ vars.TS_GCP_PROJECT_ID }}/${{ vars.TS_AR_REPOSITORY }}/engine-demo:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.TS_WIF_PROVIDER }}
          service_account: ${{ vars.TS_WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.TS_GCP_REGION }}-docker.pkg.dev" --quiet
      - name: Build and push image
        run: |
          docker build -t "$IMAGE" -f TokenOptimizer/backend/Dockerfile TokenOptimizer
          docker push "$IMAGE"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.TS_CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --project "${{ vars.TS_GCP_PROJECT_ID }}" \
            --region "${{ vars.TS_GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ vars.TS_RUN_SERVICE_ACCOUNT }}" \
            --memory 2Gi --cpu 2 --timeout 120 \
            --set-env-vars "^@@^ALLOWED_ORIGINS=${{ vars.TS_ALLOWED_ORIGINS }}@@TS_MODEL_GCS=${{ vars.TS_MODEL_GCS }}"
