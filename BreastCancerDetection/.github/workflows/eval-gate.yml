# Model eval gate: download the real weights + a labelled fixture set from GCS, run the model,
# and assert AUC > 0.85. Blocks deploy (deploy.yml runs only after this succeeds on main).
#
# Required configuration:
#   secrets.GCP_SA_KEY          - JSON key for a service account with read access to the bucket
#   vars.MODEL_GCS_URI          - gs://<project>-models/resnet50_breakhis_400x.pth
#   vars.EVAL_FIXTURES_GCS_URI  - gs://<project>-models/fixtures  (contains images + labels.csv)
name: eval-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Download eval fixtures from GCS
        run: gcloud storage cp -r "${{ vars.EVAL_FIXTURES_GCS_URI }}" "${{ github.workspace }}/eval-fixtures"
      - name: Run eval gate (real model, weights auto-downloaded from GCS)
        env:
          MODEL_GCS_URI: ${{ vars.MODEL_GCS_URI }}
          EVAL_FIXTURES_DIR: ${{ github.workspace }}/eval-fixtures
        run: uv run pytest tests/test_eval_gate.py -q -rs
